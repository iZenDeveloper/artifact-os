services:
  open-design:
    environment:
      OD_PUBLIC_BASE_URL: ${OD_PUBLIC_BASE_URL:-}
      OD_CHATGPT_MCP_RESOURCE_URL: ${OD_CHATGPT_MCP_RESOURCE_URL:-}
      OD_CHATGPT_OAUTH_ISSUER: ${OD_CHATGPT_OAUTH_ISSUER:-}
      OD_CHATGPT_OAUTH_JWKS_URL: ${OD_CHATGPT_OAUTH_JWKS_URL:-}
      OD_CHATGPT_TENANT_MODE: managed
      OD_CHATGPT_TENANT_CREDENTIAL_URL: ${OD_CHATGPT_TENANT_CREDENTIAL_URL:-}
      OD_CHATGPT_TENANT_GATEWAY_SECRET: ${OD_CHATGPT_TENANT_GATEWAY_SECRET:-}
      OD_CHATGPT_CAPABILITY_SIGNING_SECRET: ${OD_CHATGPT_CAPABILITY_SIGNING_SECRET:-}
      OD_CHATGPT_CAPABILITY_TTL_SECONDS: ${OD_CHATGPT_CAPABILITY_TTL_SECONDS:-3600}
      OD_CHATGPT_TENANT_DAEMON_ENTRY: /app/apps/daemon/dist/cli.js
      OD_CHATGPT_TENANT_MAX_ACTIVE: ${OD_CHATGPT_TENANT_MAX_ACTIVE:-8}
      OD_CHATGPT_WIDGET_FRAME_DOMAINS: ${OD_CHATGPT_WIDGET_FRAME_DOMAINS:-}
    mem_limit: ${OD_CHATGPT_MEM_LIMIT:-4g}
    pids_limit: ${OD_CHATGPT_PIDS_LIMIT:-512}
