<style>
  *{margin:0;box-sizing:border-box}
  html,body{height:100%}

    background:

    display:flex;align-items:center;justify-content:center;padding:40px;
  }
  .window{
    width:100%;max-width:960px;border-radius:14px;overflow:hidden;

  }

    display:flex;align-items:center;gap:12px;height:40px;padding:0 14px;
    background:linear-gradient(#1a1a20,#141419);border-bottom:1px solid rgba(255,255,255,.07);
  }
  .dots{display:flex;gap:7px}
  .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:#ff5f57}
  .dots i:nth-child(2){background:#febc2e}
  .dots i:nth-child(3){background:#28c840}
  .url{
    flex:1;max-width:360px;margin:0 auto;height:24px;border-radius:7px;
    background:rgba(255,255,255,.06);color:#c8c8d2;font-size:12.5px;font-weight:500;
    display:flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em;
  }
  .url b{width:6px;height:6px;border-radius:50%;background:#000000;display:block}
  .shot{display:block;width:100%;aspect-ratio:1000/625;object-fit:cover;object-position:top center;background:#0a0a0a}
</style>
