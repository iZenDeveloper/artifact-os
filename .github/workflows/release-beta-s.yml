# Self-hosted release-beta lane. Hosted baseline remains release-beta.yml.
name: release-beta-s

on:
  workflow_dispatch:
    inputs:
      enable_win:
        description: "Run the Windows self-hosted beta lane."
        required: true
        type: boolean
        default: true
      publish:
        description: "Publish release assets and metadata. Keep disabled while validating the runner lane."
        required: true
        type: boolean
        default: false
      release_version:
        description: "Optional beta version override. Leave empty to resolve the next MinIO-backed beta version from metadata."
        required: false
        type: string
        default: ""
      s3_public_origin:
        description: "Explicit anonymous-read public origin for the self-hosted S3 publish target."
        required: true
        type: string
        default: ""
      update_metadata_url:
        description: "Optional external updater metadata URL for full Windows smoke."
        required: false
        type: string
        default: ""
      update_target_version:
        description: "Optional external updater target version expected by full Windows smoke."
        required: false
        type: string
        default: ""
      smoke_mode:
        description: "Windows smoke coverage. Core gates install/start/cleanup; full adds the real upgrade lifecycle."
        required: true
        type: choice
        options:
          - core
          - full
        default: core
      target:
        description: "Windows build target."
        required: true
        type: choice
        options:
          - nsis
          - all
          - zip
          - dir
        default: nsis
      sign_mode:
        description: "Windows signing mode."
        required: true
        type: choice
        options:
          - auto
          - off
          - on
        default: auto

permissions:
  contents: read
  actions: read

concurrency:
  group: release-beta-s-win
  cancel-in-progress: false

jobs:
  metadata:
    name: Prepare beta metadata
    if: ${{ inputs.enable_win }}
    runs-on: [self-hosted, Windows, X64, nexu-win, release-beta]
    env:
      OPEN_DESIGN_BETA_METADATA_URL: ${{ inputs.s3_public_origin }}/beta/latest/metadata.json
    outputs:
      asset_version_suffix: ${{ steps.beta.outputs.asset_version_suffix }}
      base_version: ${{ steps.beta.outputs.base_version }}
      beta_version: ${{ steps.beta.outputs.beta_version }}
      branch: ${{ steps.beta.outputs.branch }}
      commit: ${{ steps.beta.outputs.commit }}
      release_name: ${{ steps.beta.outputs.release_name }}
      state_source: ${{ steps.beta.outputs.state_source }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          clean: false
          fetch-depth: 0
          lfs: false

      - name: Validate self-hosted beta inputs
        shell: cmd
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "if ('${{ inputs.enable_win }}' -ne 'true') { throw 'release-beta-s requires enable_win=true' }; if ([string]::IsNullOrWhiteSpace('${{ inputs.s3_public_origin }}')) { throw 'release-beta-s requires a non-empty s3_public_origin' }"

      - name: Prepare beta release metadata
        id: beta
        shell: cmd
        run: |
          @echo on
          fnm exec --using=24 -- cmd.exe /d /s /c "node --experimental-strip-types .\scripts\release-beta.ts"

  build_win:
    name: Build Windows beta candidate
    needs: metadata
    if: ${{ inputs.enable_win }}
    runs-on: [self-hosted, Windows, X64, nexu-win, release-beta]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          clean: false
          fetch-depth: 1
          lfs: false

      - name: Probe Windows signing capability
        id: sign_probe
        shell: cmd
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\probe-win-signing.ps1 -SignMode "${{ inputs.sign_mode }}"

      - name: Build beta candidate
        shell: cmd
        env:
          OD_BETA_WINDOWS_SIGNING_CERTIFICATE_FOUND: ${{ steps.sign_probe.outputs.certificate_found }}
          OD_BETA_WINDOWS_SIGNING_ENABLED: ${{ steps.sign_probe.outputs.enabled }}
          OD_BETA_WINDOWS_SIGNING_MODE: ${{ steps.sign_probe.outputs.mode }}
          OD_BETA_WINDOWS_SIGNING_PROBED: ${{ steps.sign_probe.outputs.probed }}
          OD_BETA_WINDOWS_SIGNING_REASON: ${{ steps.sign_probe.outputs.reason }}
          OD_BETA_WINDOWS_SIGNING_REQUESTED: ${{ steps.sign_probe.outputs.requested }}
          OD_BETA_WINDOWS_SIGNING_SIGNTOOL_FOUND: ${{ steps.sign_probe.outputs.signtool_found }}
          OD_BETA_WINDOWS_SIGNTOOL_PATH: ${{ steps.sign_probe.outputs.signtool_path }}
          OD_BETA_WINDOWS_SIGN_CERT_SHA1: ${{ steps.sign_probe.outputs.thumbprint }}
          OD_PACKAGED_E2E_WIN_UPDATE_METADATA_URL: ${{ inputs.update_metadata_url }}
          OD_PACKAGED_E2E_WIN_UPDATE_VERSION: ${{ inputs.update_target_version }}
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\build-beta.ps1 -Platform win -Lane self-hosted -Namespace release-beta-win -ReleaseVersion "${{ inputs.release_version || needs.metadata.outputs.beta_version }}" -MetadataUrl "${{ inputs.s3_public_origin }}/beta/latest/metadata.json" -SmokeMode "${{ inputs.smoke_mode }}" -Target "${{ inputs.target }}" -SignMode "${{ inputs.sign_mode }}"

      - name: Publish beta candidate platform to Nexu S3
        id: publish_platform
        if: ${{ inputs.publish }}
        shell: cmd
        env:
          S3_ENDPOINT: ${{ secrets.NEXU_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.NEXU_S3_REGION }}
          S3_BUCKET: ${{ secrets.NEXU_S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.NEXU_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.NEXU_S3_SECRET_ACCESS_KEY }}
          S3_PUBLIC_ORIGIN: ${{ inputs.s3_public_origin || vars.NEXU_S3_PUBLIC_ORIGIN }}
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\publish-platform.ps1 -IndexPath "C:\.tmp\runner\od-beta\win\index\index.json" -ChannelPrefix beta -Platform win -Probe -Publish

      - name: Upload windows publish manifest
        if: ${{ inputs.publish }}
        uses: actions/upload-artifact@v7
        with:
          name: open-design-beta-win-publish-manifest
          path: C:\.tmp\runner\od-beta\win\publish\manifests\win.json

      - name: Publish local summary
        if: ${{ always() }}
        shell: cmd
        run: |
          @echo on
          echo workspace=%GITHUB_WORKSPACE%
          echo runner_temp=%RUNNER_TEMP%
          echo runner_tool_cache=%RUNNER_TOOL_CACHE%
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "if ($env:GITHUB_WORKSPACE -like 'C:\Users\runner\Projects\*') { throw 'GITHUB_WORKSPACE must not point at the operator Projects directory' }"
          if exist "C:\.tmp\runner\od-beta\win\summary.md" echo local_summary=C:\.tmp\runner\od-beta\win\summary.md

  publish:
    name: Publish beta metadata to Nexu S3
    needs:
      - metadata
      - build_win
    if: >-
      ${{
        always() &&
        !cancelled() &&
        needs.metadata.result == 'success' &&
        needs.build_win.result == 'success' &&
        inputs.enable_win &&
        inputs.publish
      }}
    runs-on: [self-hosted, Windows, X64, nexu-win, release-beta]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          clean: false
          fetch-depth: 1
          lfs: false

      - name: Download windows publish manifest
        uses: actions/download-artifact@v8
        with:
          name: open-design-beta-win-publish-manifest
          path: ${{ runner.temp }}\release-platform-manifests

      - name: Publish beta metadata to Nexu S3
        id: publish_metadata
        shell: cmd
        env:
          S3_ENDPOINT: ${{ secrets.NEXU_S3_ENDPOINT }}
          S3_REGION: ${{ secrets.NEXU_S3_REGION }}
          S3_BUCKET: ${{ secrets.NEXU_S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.NEXU_S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.NEXU_S3_SECRET_ACCESS_KEY }}
          S3_PUBLIC_ORIGIN: ${{ inputs.s3_public_origin || vars.NEXU_S3_PUBLIC_ORIGIN }}
          STATE_SOURCE: ${{ needs.metadata.outputs.state_source }}
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\publish-beta-metadata.ps1 -ManifestRoot "${{ runner.temp }}\release-platform-manifests" -ChannelPrefix beta -Publish

      - name: Probe published beta candidate public read
        shell: cmd
        run: |
          @echo on
          powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .github\scripts\release\probe-beta-public-read.ps1 -MetadataUrl "${{ steps.publish_metadata.outputs.metadata_url }}"
